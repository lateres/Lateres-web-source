{{- $fragment := .self.Params -}}
{{- $name := strings.TrimSuffix ".md" (replace .self.Name "/index.md" "") -}}
{{- $bg := $fragment.background | default "light" }}

<section id="imgc-{{ $name }}" class="imgc-section bg-{{ $bg }}">
    <div class="container py-0">
    <div class="imgc" id="imgc-widget-{{ $name }}">
        <button class="imgc__btn imgc__btn--prev" aria-label="Previous slide">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="imgc__viewport">
            <ul class="imgc__track">
                {{ range $fragment.images }}
                <li class="imgc__slide">
                    <img src="{{ .src }}" alt="{{ .alt }}" loading="lazy">
                </li>
                {{ end }}
            </ul>
        </div>
        <button class="imgc__btn imgc__btn--next" aria-label="Next slide">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <div class="imgc__dots"></div>
    </div>
    </div>

    <style>
        .imgc {
            position: relative;
            width: 100%;
            user-select: none;
        }

        .imgc__viewport {
            overflow: hidden;
            border-radius: 12px;
        }

        .imgc__track {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }

        .imgc__slide {
            flex: 0 0 100%;
            min-width: 0;
        }

        .imgc__slide img {
            width: 100%;
            height: clamp(320px, 60vw, 700px);
            object-fit: cover;
            display: block;
        }

        .imgc__btn {
            position: absolute;
            top: 50%;
            transform: translateY(calc(-50% - 20px));
            z-index: 10;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
            padding: 0;
        }

        .imgc__btn:hover {
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transform: translateY(calc(-50% - 20px)) scale(1.08);
        }

        .imgc__btn svg {
            width: 20px;
            height: 20px;
            pointer-events: none;
        }

        .imgc__btn--prev { left: 12px; }
        .imgc__btn--next { right: 12px; }

        .imgc__dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            padding-bottom: 8px;
        }

        .imgc__dot {
            width: 8px;
            height: 8px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.2);
            border: none;
            cursor: pointer;
            padding: 0;
            transition: width 0.3s ease, background 0.3s ease;
        }

        .imgc__dot.is-active {
            width: 24px;
            background: rgba(0, 0, 0, 0.55);
        }

        @media (max-width: 576px) {
            .imgc__btn {
                width: 36px;
                height: 36px;
            }
            .imgc__btn svg {
                width: 16px;
                height: 16px;
            }
        }
    </style>

    <script>
        (function () {
            var widget = document.getElementById('imgc-widget-{{ $name }}');
            if (!widget) return;

            var track = widget.querySelector('.imgc__track');
            var slides = Array.from(widget.querySelectorAll('.imgc__slide'));
            var dotsContainer = widget.querySelector('.imgc__dots');
            var prevBtn = widget.querySelector('.imgc__btn--prev');
            var nextBtn = widget.querySelector('.imgc__btn--next');
            var current = 0;
            var autoTimer;
            var isAnimating = false;

            // Build dots
            slides.forEach(function (_, i) {
                var dot = document.createElement('button');
                dot.className = 'imgc__dot';
                dot.setAttribute('aria-label', 'Go to slide ' + (i + 1));
                dot.addEventListener('click', function () { goTo(i); resetAuto(); });
                dotsContainer.appendChild(dot);
            });

            function updateDots() {
                Array.from(dotsContainer.children).forEach(function (d, i) {
                    d.classList.toggle('is-active', i === current);
                });
            }

            function goTo(index) {
                if (isAnimating) return;
                isAnimating = true;
                current = (index + slides.length) % slides.length;
                track.style.transform = 'translateX(-' + (current * 100) + '%)';
                updateDots();
                setTimeout(function () { isAnimating = false; }, 560);
            }

            prevBtn.addEventListener('click', function () { goTo(current - 1); resetAuto(); });
            nextBtn.addEventListener('click', function () { goTo(current + 1); resetAuto(); });

            // Keyboard navigation
            widget.setAttribute('tabindex', '0');
            widget.addEventListener('keydown', function (e) {
                if (e.key === 'ArrowLeft') { goTo(current - 1); resetAuto(); }
                if (e.key === 'ArrowRight') { goTo(current + 1); resetAuto(); }
            });

            // Touch / swipe
            var touchStartX = 0;
            track.addEventListener('touchstart', function (e) {
                touchStartX = e.touches[0].clientX;
            }, { passive: true });
            track.addEventListener('touchend', function (e) {
                var dx = e.changedTouches[0].clientX - touchStartX;
                if (Math.abs(dx) > 40) {
                    goTo(dx < 0 ? current + 1 : current - 1);
                    resetAuto();
                }
            });

            function startAuto() {
                autoTimer = setInterval(function () { goTo(current + 1); }, 5000);
            }
            function resetAuto() {
                clearInterval(autoTimer);
                startAuto();
            }

            goTo(0);
            startAuto();
        })();
    </script>
</section>
